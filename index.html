<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CosmoClicker: O Despertar do Buraco Negro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="big-bang-overlay" class="hidden">
        <div class="explosion-core"></div>
        <h1 class="flash-text">💥 BIG BANG! 💥</h1>
        <p class="flash-sub">O Universo renasceu 1.5x mais forte!</p>
    </div>

    <div id="game-container">
        <h1>CosmoClicker</h1>
        <p class="subtitle">Absorva o universo, um clique de cada vez.</p>
        
        <div class="score-container">
            <p style="font-size: 1.4rem;">Massa: <strong id="mass-display">0</strong> AM</p>
            <p>Por segundo (MPS): <span id="mps-display">0</span></p>
            <p>Por clique (MPC): <span id="mpc-display">1</span></p>
            <p style="font-size: 0.9rem; color: #f472b6; margin-top: 8px;">
                Multiplicador Cósmico: <span id="multiplier-display">1.0</span>x
            </p>
        </div>

        <div id="black-hole"></div>

        <div class="shop-tabs">
            <h3 style="color: #9333ea; margin: 0;">Loja Espacial</h3>
        </div>

        <div class="shop-container">
            <div class="section-title">✨ Upgrades de Clique</div>
            <button id="click1-btn" class="btn-upgrade" disabled>
                <span>Mão Gravitacional (+2 por clique)</span>
                <span class="cost" id="click1-cost">50 AM</span>
            </button>
            <button id="click2-btn" class="btn-upgrade" disabled>
                <span>Fenda Temporal (+5 por clique)</span>
                <span class="cost" id="click2-cost">250 AM</span>
            </button>

            <div class="section-title">🛸 Automação Cósmica</div>
            <button id="auto1-btn" class="btn-upgrade" disabled>
                <span>🪐 Poeira Estelar (+0.2 MPS)</span>
                <span class="cost" id="auto1-cost">15 AM</span>
            </button>
            <button id="auto2-btn" class="btn-upgrade" disabled>
                <span>🛰️ Satélite Antigo (+1.5 MPS)</span>
                <span class="cost" id="auto2-cost">100 AM</span>
            </button>
            <button id="auto3-btn" class="btn-upgrade" disabled>
                <span>☄️ Aspirador de Cometas (+12 MPS)</span>
                <span class="cost" id="auto3-cost">1.100 AM</span>
            </button>
            <button id="auto4-btn" class="btn-upgrade" disabled>
                <span>🚀 Frota de Mineração (+50 MPS)</span>
                <span class="cost" id="auto4-cost">8.000 AM</span>
            </button>
            <button id="auto5-btn" class="btn-upgrade" disabled>
                <span>🌑 Devorador de Luas (+250 MPS)</span>
                <span class="cost" id="auto5-cost">45.000 AM</span>
            </button>
            <button id="auto6-btn" class="btn-upgrade" disabled>
                <span>🌟 Estrela de Nêutrons (+1.200 MPS)</span>
                <span class="cost" id="auto6-cost">200.000 AM</span>
            </button>
            <button id="auto7-btn" class="btn-upgrade" disabled>
                <span>🌌 Nebulosa de Plasma (+6.500 MPS)</span>
                <span class="cost" id="auto7-cost">1.500.000 AM</span>
            </button>
            <button id="auto8-btn" class="btn-upgrade" disabled>
                <span>👑 Supernova Reversa (+35.000 MPS)</span>
                <span class="cost" id="auto8-cost">10.000.000 AM</span>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
